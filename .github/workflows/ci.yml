name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version-check:
    name: Version format check
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python is available on self-hosted runner
        shell: bash
        run: |
          if command -v python >/dev/null 2>&1; then
            python --version
            echo "PYTHON_BIN=python" >> "$GITHUB_ENV"
          elif command -v python3 >/dev/null 2>&1; then
            python3 --version
            echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
          else
            echo "Neither 'python' nor 'python3' is available on this self-hosted runner." >&2
            exit 1
          fi

      - name: Validate pyproject.toml version is SemVer
        # Ensures the version in pyproject.toml is always MAJOR.MINOR.PATCH –
        # a merge to main with an invalid or missing version is blocked.
        shell: bash
        run: |
          "$PYTHON_BIN" scripts/check_version.py --check-semver

      - name: Enforce release discipline
        shell: bash
        run: |
          "$PYTHON_BIN" scripts/check_release_discipline.py

      - name: Check model consistency
        shell: bash
        run: |
          "$PYTHON_BIN" scripts/check_model_consistency.py

  test:
    runs-on: self-hosted
    needs: version-check
    strategy:
      matrix:
        python-version: ["3.12"]
    name: Test (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git-based signals

      - name: Ensure Python is available on self-hosted runner
        shell: bash
        run: |
          if command -v python >/dev/null 2>&1; then
            python --version
            echo "PYTHON_BIN=python" >> "$GITHUB_ENV"
          elif command -v python3 >/dev/null 2>&1; then
            python3 --version
            echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
          else
            echo "Neither 'python' nor 'python3' is available on this self-hosted runner." >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          "$PYTHON_BIN" -m pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        shell: bash
        run: |
          "$PYTHON_BIN" -m mypy src/drift

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=drift --cov-report=xml --cov-report=term-missing -m "not slow"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Self-analysis
        run: drift analyze --repo . --format json > /dev/null

      - name: Drift self-check (score gate)
        shell: bash
        run: |
          drift self --format json > drift_score.json
          "$PYTHON_BIN" - <<'PY'
          import json, sys
          data = json.load(open('drift_score.json'))
          score = data['drift_score']
          if score > 0.47:
              print(f'FAIL: drift self score {score:.3f} exceeds threshold 0.47')
              sys.exit(1)
          print(f'OK: drift self score {score:.3f} (threshold 0.47)')
          PY
